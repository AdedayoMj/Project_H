artifacts = ["/app/output.json"]  # paths the verifier reads from the agent (e.g. ["/app/output.json"]) — must be above the first [section]

[task]
name = "dynamo/te-reimbursement-audit"  # required format: org/name (Harbor needs the slash); name part lowercase kebab-case, <=3 words
description = "Compute exact per-line reimbursement and compliance disposition for an international business trip against a multi-clause T&E expense policy."                 # one-line summary of the task

[metadata]
# --- Pre-seeded for you when this repo was created — DO NOT EDIT ---
category = "Regulated Knowledge Work and Business Operations"                      # diversity category, assigned to your task by the Dynamo team
subcategory = "Personal Assistant Productivity"                   # diversity subcategory, assigned by the Dynamo team
# --- Fixed for this dataset — LEAVE AS-IS ---
model_tested = "Opus-4.8"           # difficulty-benchmarking model (do not change)
agent_tested = "Terminus-2"        # difficulty-benchmarking agent (do not change)
# --- You fill these in ---
# task_objective / artifact_type: pick from .dynamo/diversity-taxonomy.toml (lowercase snake_case).
task_objective = ["analyze"]                # e.g. ["implement", "debug"]
artifact_type = ["generated_output_artifact"]                 # e.g. ["codebase", "configuration_file"]
expert_time_estimate_hours = 6.0     # best-case hours for a focused domain expert with the intended insight
difficulty_explanation = "This task requires composing several T&E policy clauses correctly on each line: VAT reclaim, two-hop FX, meal caps, airfare counterfactuals, foreign-fee reimbursement, mileage, duplicates, and running category thresholds. The data is realistic and intentionally includes traps such as cross-category duplicate candidates and meals that depend on payer/attendee details, so a solver has to follow the written rules rather than pattern-match."        # why this task is hard for agents and humans
solution_explanation = "Apply the stated rule chain for MEALS/AIRFARE, compute MILEAGE from directional distance and effective-date rates, exclude exact duplicates on vendor+amount+date+category, and mark approval based on per-line and running category totals. Reconstruct per diem from the itinerary day by day. All amounts are integer cents."          # high-level approach and key insights
verification_explanation = "tests/test_outputs.py checks that /app/output.json exists, is not a symlink, has the exact required schema, that /app/input/ matches the golden copy byte-for-byte, and that every line item and trip-summary field exactly matches the reference output with no tolerance."      # how the tests verify correctness

[verifier]
timeout_sec = 120.0                # increase based on your test suite's runtime demands
# Canonical TB2: the verifier runs in the environment image (no separate tests/Dockerfile).
# Harbor overlays tests/ at verify time; leave environment_mode unset for this shared model.

[agent]
timeout_sec = 3600.0                # raise for hard tasks — agents may run for many minutes or hours

[environment]
build_timeout_sec = 600.0          # max seconds for the Docker build
cpus = 1                           # increase for parallel/compute-heavy workloads
memory_mb = 2048                   # increase for large datasets or in-memory processing
storage_mb = 10240                 # increase for tasks with large files or build artifacts
gpus = 0                           # max 1, expect H100
allow_internet = true              # open internet is available to the agent
mcp_servers = []                   # optional MCP servers to expose to the agent
