artifacts = ["/app/output.json"]  # paths the verifier reads from the agent (e.g. ["/app/output.json"]) — must be above the first [section]

[task]
name = "dynamo/te-reimbursement-audit"  # required format: org/name (Harbor needs the slash); name part lowercase kebab-case, <=3 words
description = "Compute exact per-line reimbursement and compliance disposition for an international business trip against a multi-clause T&E expense policy, then optimally trim the trip to its reimbursement budget."                 # one-line summary of the task

[metadata]
# --- Pre-seeded for you when this repo was created — DO NOT EDIT ---
category = "Regulated Knowledge Work and Business Operations"                      # diversity category, assigned to your task by the Dynamo team
subcategory = "Personal Assistant Productivity"                   # diversity subcategory, assigned by the Dynamo team
# --- Fixed for this dataset — LEAVE AS-IS ---
model_tested = "Opus-4.8"           # difficulty-benchmarking model (do not change)
agent_tested = "Terminus-2"        # difficulty-benchmarking agent (do not change)
# --- You fill these in ---
# task_objective / artifact_type: pick from .dynamo/diversity-taxonomy.toml (lowercase snake_case).
task_objective = ["analyze", "optimize"]                # e.g. ["implement", "debug"]
artifact_type = ["generated_output_artifact"]                 # e.g. ["codebase", "configuration_file"]
expert_time_estimate_hours = 6.0     # best-case hours for a focused domain expert with the intended insight
difficulty_explanation = "This is the compliance-adjacent work a T&E analyst or chief-of-staff performs, and getting any single clause wrong either overpays at scale or wrongly denies legitimate reimbursement, so the figure has to be defensible on audit rather than approximately right. Three independent layers compound on top of a per-line rule chain (VAT reclaim gated on both country AND category, two-hop dated FX rounded at each hop, the flat-vs-per-head meal cap distinction, per-line airfare counterfactuals, foreign-fee eligibility, directional mileage with effective-date rates, exact-duplicate exclusion keyed on vendor+amount+date+category, and running-total category-aggregate approval thresholds). First, a narrow-reading trap: a meal dated on a personal day is non-reimbursable UNLESS it is a genuine client meal (a CLIENT-typed attendee with the executive as payer), so a solver that over-generalizes 'personal-day meals are non-reimbursable' wrongly zeroes a legitimate client dinner while one that ignores the personal-day rule wrongly pays a personal meal. Second, an anti-double-dip interaction couples the two otherwise-independent halves of the task: each business day's per-diem is reduced by the reimbursable meals dated that day, so a solver that computes per-diem and meal lines separately silently double-counts (here it inflates per diem from 68,400 to only 10,660 cents once the coupling is applied). Third, and hardest, a whole-trip reimbursement budget cap turns the closeout into a 0/1 knapsack: when the gross payout exceeds the cap, whole lines must be deferred to maximize retained priority weight, then retained amount, then a deterministic (date, line_id) tie-break — and the near-perfectly-packed instance leaves only a few hundred cents of slack, so the natural greedy 'defer lowest-priority-first' heuristic over-defers (five lines instead of the optimal three) and produces a detectably wrong schedule. A qualified analyst-programmer implementing the disclosed rules, recognizing that the budget trim needs an exact optimizer rather than a greedy pass, and validating a hand-computed subset before trusting the full run, should need on the order of 6 focused hours."        # why this task is hard for agents and humans
solution_explanation = "For each line apply the exclusion order first: is_personal_expense TRUE -> NON_REIMBURSABLE; a MEALS line dated on a personal itinerary day -> NON_REIMBURSABLE unless it is a client meal (>=1 CLIENT attendee and EXECUTIVE payer); then exact (vendor, amount, date, category) duplicates after the first -> DUPLICATE_EXCLUDED. For surviving MEALS/AIRFARE lines, subtract VAT only when country and category are both eligible (rounded, ties up), convert to home currency via two dated hops rounding at each hop, cap MEALS by the per-head blended cap for genuine client meals or the flat solo cap otherwise, cap AIRFARE per line against the counterfactual fare when the trip has any personal day, and add the foreign-transaction fee (converted, capped) when currencies differ and no fee-free alternative existed; MILEAGE uses directional distance times the effective-date rate minus the commute deduction, floored at zero. Reconstruct per diem day by day (personal days zero, first/last prorated), then reduce each day by that day's reimbursable meal amounts (floored at zero) to avoid double-dipping. Flag approvals by walking each category in (date, line_id) order against per-line and running-aggregate thresholds. Finally, if total per diem plus all surviving line amounts exceeds trip_reimbursement_cap_cents, solve a 0/1 knapsack (CP-SAT) that keeps a subset of lines maximizing, lexicographically, retained priority weight (weight = 6 - priority), then retained amount, then a (date, line_id) greedy tie-break that makes the kept set unique; deferred lines become DEFERRED_OVER_BUDGET with amount 0. All arithmetic is integer home-currency cents; the reference values were cross-checked against an independent brute-force knapsack on smaller instances before trusting CP-SAT at full size."          # high-level approach and key insights
verification_explanation = "tests/test_outputs.py checks, atomically: that /app/output.json exists, is not a symlink, and parses to the exact two-key top-level schema; that /app/input/ is byte-identical to a golden copy kept in tests/ (never visible to the agent); that line_items has exactly one entry per expense row with exactly {line_id, reimbursable_cents, status}, every status one of the five disclosed labels and every amount a non-negative integer; that trip_summary has exactly the seven required fields correctly typed; that final_reimbursable_cents never exceeds the trip budget cap; that deferred_over_budget_line_ids is exactly the set of DEFERRED_OVER_BUDGET lines (each amount 0); and that, compared order-independently by line_id, every line's reimbursable_cents and status and every trip_summary field (including the category breakdown) exactly match tests/expected_output.json, with no tolerance anywhere. expected_output.json was produced by the reference solver (task/solution/solve.py); the knapsack selection was independently cross-checked at authoring time against a from-scratch brute-force enumeration over all feasible retained subsets on smaller instances (agreeing on 300 randomized cases), and the personal-day-meal rule, the anti-double-dip per-diem reduction, and the budget deferral were each confirmed to change at least one graded value, so a solver that drops any one layer -- or that trims the budget with a greedy heuristic instead of an exact optimum -- diverges from the reference on at least one field rather than passing by coincidence."      # how the tests verify correctness

