artifacts = ["/app/output.json"]  # paths the verifier reads from the agent (e.g. ["/app/output.json"]) — must be above the first [section]

[task]
name = "dynamo/te-reimbursement-audit"  # required format: org/name (Harbor needs the slash); name part lowercase kebab-case, <=3 words
description = "Compute exact per-line reimbursement and compliance disposition for an international business trip against a multi-clause T&E expense policy."                 # one-line summary of the task

[metadata]
# --- Pre-seeded for you when this repo was created — DO NOT EDIT ---
category = "Regulated Knowledge Work and Business Operations"                      # diversity category, assigned to your task by the Dynamo team
subcategory = "Personal Assistant Productivity"                   # diversity subcategory, assigned by the Dynamo team
# --- Fixed for this dataset — LEAVE AS-IS ---
model_tested = "Opus-4.8"           # difficulty-benchmarking model (do not change)
agent_tested = "Terminus-2"        # difficulty-benchmarking agent (do not change)
# --- You fill these in ---
# task_objective / artifact_type: pick from .dynamo/diversity-taxonomy.toml (lowercase snake_case).
task_objective = ["analyze"]                # e.g. ["implement", "debug"]
artifact_type = ["generated_output_artifact"]                 # e.g. ["codebase", "configuration_file"]
expert_time_estimate_hours = 6.0     # best-case hours for a focused domain expert with the intended insight
difficulty_explanation = "Closing out a multi-city, mixed-business/personal international trip against a real corporate T&E policy requires composing several individually simple rules correctly on the same line, which is exactly the compliance-adjacent work an EA, travel coordinator, or T&E analyst performs, and getting any one rule wrong either overpays at scale across thousands of reports or wrongly denies legitimate reimbursement -- in a regulated environment the resulting figure has to be defensible on audit, not approximately right. The data is synthetic but built at realistic scale and structure: a 10-day, 3-city, 2-currency itinerary with 29 expense lines (26 MEALS/AIRFARE plus 3 MILEAGE) exercising every rule family at least twice, real dated FX and mileage-rate tables, and a policy written as interacting clauses. Several distinct, independently-checkable pitfalls compound: per-diem must be looked up from the itinerary's own explicit nightly `sleeping_city` field, not inferred from any same-day connecting flight or airfare line's origin/destination (one meal line is dated and tagged with airport-adjacent origin/destination cities purely as a decoy on exactly such a connecting day); the per-attendee blended meal cap applies only to a genuine client meal (a CLIENT-typed attendee with the executive as payer of record) -- any other meal, including a multi-person internal dinner, is capped at the flat solo amount regardless of headcount, so naively multiplying the cap by headcount whenever attendees are present produces a plausible but wrong figure, and one meal line is intentionally billed by a non-executive payer so that condition is observable; the two-hop, two-dated FX conversion (transaction currency to card-billing currency at the transaction date, then to home currency at the statement-post date) must round at each hop rather than once at the end, in the policy's stated rounding mode, which is the kind of silent numerical-drift trap that passes on most lines and diverges only on the ones that hit a rounding boundary; the airfare counterfactual cap and the foreign-transaction-fee eligibility both depend on trip-wide or per-line conditions (any personal day anywhere in the trip; whether a fee-free alternative existed) that are easy to apply inconsistently; the duplicate rule is keyed on vendor, amount, date, and category, so a same-vendor/same-date/same-amount pair spanning two categories is a useful trap for implementations that forget category; and the category-aggregate approval threshold is evaluated as a running cumulative total in ascending (date, line_id) order, so it can flag a line whose own amount is small purely because the category's cumulative spend crossed the threshold earlier that day -- a naive 'flag every line once the category total exceeds the threshold anywhere' implementation, or an 'only ever check the per-line cap' implementation, both produce detectably wrong dispositions on specific lines rather than crashing. A qualified T&E analyst-programmer working from the disclosed priors -- not inventing any rule, only correctly sequencing and composing what the policy and instruction state -- should need on the order of 6 focused hours: implementing the per-line rule chain (VAT-reclaim subtraction, two-hop dated FX, category cap, fee eligibility), the duplicate-exclusion precedence, the running-total aggregate check, the mileage rate-effective-date lookup, and the day-by-day per-diem reconstruction, then validating a hand-computed subset spanning every rule family before trusting the full run."        # why this task is hard for agents and humans
solution_explanation = "For every MEALS or AIRFARE line, apply the rule chain in order: if the line's country/category pair is VAT-reclaim-eligible, subtract that country's VAT rate from the amount (rounded to the cent) before anything else; convert the remainder to home currency via two dated hops (transaction currency to card-billing currency at the transaction date, then card-billing currency to home currency at the statement-post date), rounding to the cent after each hop; apply the category cap (the per-attendee blended cap only when a CLIENT-typed attendee is present and payer is EXECUTIVE, otherwise the flat solo cap regardless of headcount; for AIRFARE, the lesser of the converted fare and the supplied counterfactual fare whenever the itinerary contains any personal day); and, if the transaction and card-billing currencies differ and no fee-free alternative existed, convert the foreign-transaction fee through the same two hops and add it on top, capped at the policy maximum. MILEAGE lines skip VAT/FX and instead look up directional mileage for the line's (origin_city, destination_city) pair, multiply by the rate whose effective-date range contains the line's date, and subtract the flat commute deduction, floored at zero. Duplicate detection is then a single pass keyed on (vendor, amount, date, category) among non-personal-expense lines, keeping the first occurrence and excluding all later exact matches. Approval disposition is computed by walking each category's remaining lines in ascending (date, line_id) order while accumulating a running total: a line is flagged NEEDS_MANAGER_APPROVAL if its own computed amount exceeds the per-line threshold, or if the running total through that line exceeds the category's aggregate threshold; every other non-excluded line is APPROVED, and a personal-expense line is NON_REIMBURSABLE unconditionally, checked before duplicate detection. Per diem is reconstructed independently of the expense ledger, day by day from the itinerary's own sleeping_city and is_personal_day fields, applying the city's daily rate, zeroing personal days, and prorating the trip's first and last calendar day (by date) at the policy's stated fraction. All arithmetic is carried in integer home-currency cents throughout (Decimal internally, rounded at each specified step), so the reference solution's totals are fully derived and reproducible, not chosen; they were cross-checked at authoring time with an independent, differently-structured script that recomputes a curated subset of lines by hand -- one over-cap solo meal with a reimbursable foreign fee, one under-cap client meal, one client meal billed by a non-executive payer, one internal group meal to confirm the flat (not per-head) cap, a same-vendor/same-date/same-amount MEALS/AIRFARE pair that proves category stays in the duplicate key, both airfare lines (the counterfactual-capped fare and the second fare that only trips the AIRFARE category-aggregate threshold, not the per-line one), both mileage legs on either side of the rate-effective-date boundary, and the full day-by-day per-diem sum -- all of which matched the solver exactly before trusting it on the remaining lines."          # high-level approach and key insights
verification_explanation = "tests/test_outputs.py checks, atomically: that /app/output.json exists, is not a symlink, and parses to a JSON object; that /app/input/ is byte-identical to a golden copy kept in tests/ (never visible to the agent); that the top-level schema is exactly {'line_items': <array>, 'trip_summary': <object>}; that line_items has exactly one entry per row of the golden expense_lines.csv, matching line_ids with no missing or invented ones; that every reimbursable_cents value is a non-negative JSON integer and every status is one of the four disclosed labels; and that, compared order-independently (sorted by line_id), every line's reimbursable_cents and status, and every field of trip_summary (including the per-category breakdown), exactly match tests/expected_output.json -- no tolerance anywhere, since this is deterministic policy arithmetic on integer cents and any deviation reflects a misapplied or misordered rule rather than acceptable rounding variance. expected_output.json was produced by the reference solver (task/solution/solve.py) and independently cross-checked at authoring time by a from-scratch, differently-structured verification script (not importing or calling solve.py) that recomputes a curated subset of lines by hand -- spanning the VAT/two-hop-FX/cap/fee chain for both a GBP and a EUR meal (including one GBP meal engineered to land on an exact rounding-mode tie), the flat-vs-per-head meal cap distinction, a client meal billed by a non-executive payer, a same-vendor/same-date/same-amount cross-category pair that proves category stays in the duplicate key, the airfare counterfactual comparison and the airfare category-aggregate threshold (tripped only by the running total, not any single line), both sides of the mileage rate-effective-date boundary, the mileage commute-deduction floor (one short local leg deducts to below zero and must clamp to exactly 0, not a negative reimbursement), and the full day-by-day per-diem reconstruction -- all of which matched the solver's values exactly. With 29 independently-gradable line-level dispositions plus four trip-summary totals and a three-category breakdown, a solver that mishandles even one rule family (the sleeping-city per-diem lookup, the meal-cap headcount distinction, hop-order rounding, the trip-wide personal-day/fee-eligibility conditions, or the running-total aggregate ordering) reliably produces at least one detectably wrong value rather than passing by coincidence."      # how the tests verify correctness

