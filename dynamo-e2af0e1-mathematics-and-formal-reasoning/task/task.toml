# --- You fill these in ---
# task_objective / artifact_type: pick from .dynamo/diversity-taxonomy.toml (lowercase snake_case).
task_objective = ["analyze"]                # e.g. ["implement", "debug"]
artifact_type = ["generated_output_artifact"]                 # e.g. ["codebase", "configuration_file"]
expert_time_estimate_hours = 5.0     # best-case hours for a focused domain expert with the intended insight
difficulty_explanation = "Computing the exact number of substitution patterns on a ring up to its dihedral symmetry group, subject to a fixed composition and a steric-clash table, is Polya enumeration's original motivating application (isomer counting) done properly rather than by its textbook special case. A cheminformatician or synthetic chemist scoping a combinatorial library needs this exact count before synthesis, both to size a batch correctly and to confirm a proposed library is not quietly full of duplicate structures once physical symmetry is accounted for; getting it wrong either wastes reactor capacity on redundant structures or under-reports how much chemical diversity a given stoichiometry actually buys. The composition constraint means the standard closed-form cycle-index substitution (averaging, over the group, of colors^cycles) does not apply as-is: for each of the 2n elements of the dihedral group D_n, the number of colorings it fixes that also match the exact composition requires assigning one color to each of that element's position-cycles subject to a target-count budget, not a free choice per cycle -- an easy point to silently drop, since it is precisely the place the ordinary necklace-counting formula from any combinatorics reference must be generalized rather than applied directly. Layered on top, the steric-clash table is defined on the ring's real physical edges, but a coloring fixed by a rotation is constant on that rotation's cycles, and for cycles of length greater than 1 the physically-adjacent ring positions almost never fall in the same cycle -- so checking the clash table correctly requires reasoning about how the cycle structure interacts with real ring adjacency, not checking each cycle in isolation. That specific shortcut is the trap most likely to produce a confidently wrong but plausible-looking formula, because it 'type-checks' against the cycle-index framework while silently ignoring most of the ring's edges. A further, closely related trap comes from self-clash entries: a forbidden pair may name the same substituent twice (["X", "X"]: no two units of X on adjacent positions), and this is the one case where an edge internal to a fixed element's cycle carries a real constraint -- since the fixed coloring is constant on each cycle, a cycle that happens to contain two physically-adjacent positions cannot be colored X at all. An implementation built on the usual and otherwise-safe 'forbidden pairs are always distinct, so within-cycle edges never matter' assumption silently over-counts the fixed points of exactly the reflections (and coprime rotations) whose cycles pair adjacent positions, yielding a wrong-but-plausible integer, or even a Burnside sum that is not divisible by 2n. Reflections add a further, independent trap: which positions are fixed points versus paired positions depends on the reflection axis (through two opposite vertices, through two opposite edge-midpoints, or through exactly one vertex when n is odd), and mishandling this does not crash -- it silently shifts the final count by a small, plausible-looking wrong amount. The data is synthetic (procedurally chosen ring sizes, compositions, and clash tables), but is sized and structured the way a real substituent-library screen would be: raw linear-arrangement counts before symmetry and clash-filtering reach roughly 2x10^17 for the largest recipe, which forecloses any brute-force generate-and-canonicalize approach, while a correctly-derived method answers every recipe in well under a second."        # why this task is hard for agents and humans
solution_explanation = "For each of the 2n elements of the dihedral group D_n acting on the n ring positions (n rotations r_d: i -> i+d mod n, and n reflections s_c: i -> c-i mod n), compute its cycle decomposition on positions 0..n-1. Contract each cycle to a single node and connect two nodes with an edge whenever some physical ring edge (i, i+1 mod n) joins positions belonging to those two different cycles. An edge internal to one cycle (both endpoints in the same cycle) matters only for a self-clash pair [X, X]: a coloring fixed by the group element is constant within a cycle, so both endpoints of an internal edge take that cycle's color, and if the clash table forbids that color adjacent to itself the assignment is void -- so each node also records whether it owns an internal edge (a self-loop), and the DP rejects a self-clashing color on such a node; for a distinct-substituent pair an internal edge imposes nothing, since a cycle is monochromatic. Because every group element here comes from the ring's own dihedral action, this quotient graph is always exactly a single path or a single simple cycle over the element's cycles (a rotation with gcd(n,d)=g produces a g-node cycle whose edges are a period-g block's own wraparound adjacency; a reflection produces a path, capped by fixed-point nodes wherever its axis passes through a vertex) -- never a more complex graph, which is what makes one reusable per-element computation possible instead of a case split by rotation type and reflection type. |Fix(g)| is then the number of ways to assign one color to each quotient node such that, walking the path/cycle in order, no two nodes joined by a quotient edge get a forbidden color pair (including the closing edge back to the first node when the quotient graph is itself a cycle), and summing each node's cycle length under its assigned color hits the recipe's exact composition target for every substituent; a single DP over the path/cycle order, carrying (remaining per-substituent budget, previous node's color, first node's color), computes this directly. Summing |Fix(g)| over all 2n elements and dividing by 2n (Burnside's lemma) gives the recipe's isomer count. The only large quotient graph is the identity rotation's (n nodes, i.e. the full ring); every other element's quotient graph has at most n/2 nodes and is usually far smaller, so the whole computation stays a fraction of a second even for the n=30 recipe, where literally generating and dihedral-canonicalizing the roughly 2x10^17 raw linear arrangements is not an option. A qualified combinatorialist implementing this from the composition and clash-table priors given in the instruction -- deriving the quotient-graph reduction, writing the path/cycle DP, and validating it against brute-force canonicalization on hand-picked small rings before trusting it at n=30 -- should need on the order of 4-6 focused hours."          # high-level approach and key insights
verification_explanation = "tests/test_outputs.py checks, atomically: that /app/output.json exists, is not a symlink, and parses to a JSON object; that /app/input/ is byte-identical to a golden copy kept in tests/ (never visible to the agent), so a recipe cannot be edited into an easier one; that the top-level schema is exactly {'isomer_counts': <object>}; that isomer_counts' keys are exactly the 10 recipe_ids present in the input (no missing or invented ones); that every value is a JSON integer (not a bool, float, or string) and non-negative; and that every one of the 10 values exactly equals the corresponding value in tests/expected_output.json, with no tolerance anywhere (a discrete count has no 'close enough'). expected_output.json's values were produced by the reference solver (task/solution/solve.py) and independently cross-checked at authoring time: for the 8 recipes with n_positions <= 10 (R1-R6, R8, R9), a from-scratch, differently-implemented brute-force method (enumerate every distinct linear arrangement of the composition's multiset, keep those whose every physical adjacency -- treating a self-pair [X,X] uniformly as the unordered pair {X} -- is not in the clash table, canonicalize each under all 2n dihedral images, count distinct canonical forms) reproduces the reference solver's value exactly; that same brute-force method was further run against several dozen additional randomized small rings never shipped with the task, spanning both parities of n, several clash densities, self-clash pairs, and edge cases (an empty clash table, a fully-forbidden clash table forcing a zero count, a single-substituent recipe), all matching. Recipes R7 (n_positions=30) and R10 (n_positions=28), the only two too large to brute-force, are graded on the reference solver's value alone, with correctness confidence carried over from that same cross-validated method at smaller scale. Because R1-R10 are graded independently and jointly -- the agent must get every one right, not just the large recipes -- a formula that only happens to work when the clash table is empty, that mishandles one reflection-axis case, or that ignores the internal-cycle edge a self-clash pair activates, will diverge from the reference on at least one of the 10 recipes rather than passing by coincidence."      # how the tests verify correctness

