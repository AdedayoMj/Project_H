[task]
name = "dynamo/macrocycle-isomer-census"  # required format: org/name (Harbor needs the slash); name part lowercase kebab-case, <=3 words
description = "Count physically distinct substitution patterns on macrocyclic ring scaffolds under dihedral symmetry, fixed composition, and steric-clash constraints."                 # one-line summary of the task

[metadata]
# --- Pre-seeded for you when this repo was created — DO NOT EDIT ---
category = "Mathematics and Formal Reasoning"                      # diversity category, assigned to your task by the Dynamo team
subcategory = "Combinatorics and enumeration"                   # diversity subcategory, assigned by the Dynamo team
# --- Fixed for this dataset — LEAVE AS-IS ---
model_tested = "Opus-4.8"           # difficulty-benchmarking model (do not change)
agent_tested = "Terminus-2"        # difficulty-benchmarking agent (do not change)
# --- You fill these in ---
# task_objective / artifact_type: pick from .dynamo/diversity-taxonomy.toml (lowercase snake_case).
task_objective = ["analyze"]                # e.g. ["implement", "debug"]
artifact_type = ["generated_output_artifact"]                 # e.g. ["codebase", "configuration_file"]
expert_time_estimate_hours = 5.0     # best-case hours for a focused domain expert with the intended insight
difficulty_explanation = "Counting substitution patterns on the ring is no longer a single dihedral-symmetry exercise: the recipes mix rotation-only and rotation-plus-reflection equivalence, several recipes include self-clash pairs, and the compositions are chosen so the exact per-recipe count must be derived rather than guessed or brute-forced. A chemist or combinatorialist would need this kind of count to size a library correctly and avoid silently double-counting chiral scaffolds or undercounting achiral ones before synthesis. The hard part is not just applying Burnside's lemma; it is reading each recipe's symmetry group correctly, handling composition budgets exactly, and keeping the clash constraints aligned with the actual ring adjacency under every symmetry element. That mixture is the trap: a solver that assumes every recipe is dihedral, or that treats self-clash pairs as ordinary distinct pairs, can still produce plausible-looking integers while being wrong on multiple recipes. The data is synthetic but deliberately heterogeneous, with small instances that can be cross-checked and larger instances that force a real algorithm."        # why this task is hard for agents and humans
solution_explanation = "For each recipe, read its symmetry_group. If it is cyclic, run Burnside over the n rotations only; if it is dihedral, run Burnside over the 2n rotations and reflections. For each group element, compute the cycle decomposition on positions 0..n-1, contract each cycle to a quotient node, and connect nodes whenever a physical ring edge joins positions from different cycles. An edge internal to a cycle matters only for a self-clash pair [X, X]: the fixed coloring is constant on that cycle, so if that color is forbidden adjacent to itself the assignment is void. The quotient graph is still a single path or a single simple cycle, so one path/cycle DP over the quotient order is enough: track the remaining composition budget, the previous color, and the first color when the quotient closes back on itself. Summing the fixed-coloring counts over the recipe's symmetry group and dividing by the group size gives the exact isomer count. The main implementation trap is assuming one symmetry rule for every recipe, which is wrong once cyclic and dihedral scaffolds are mixed in the same input."          # high-level approach and key insights
verification_explanation = "tests/test_outputs.py checks, atomically: that /app/output.json exists, is not a symlink, and parses to a JSON object; that /app/input/ is byte-identical to a golden copy kept in tests/ (never visible to the agent), so a recipe cannot be edited into an easier one; that the top-level schema is exactly {'isomer_counts': <object>}; that isomer_counts' keys are exactly the recipe_ids present in the input (no missing or invented ones); that every value is a JSON integer (not a bool, float, or string) and non-negative; and that every value exactly equals the corresponding value in tests/expected_output.json, with no tolerance anywhere. expected_output.json's values are produced by the reference solver (task/solution/solve.py) and are cross-checked during authoring against independent brute force on the small recipes. Because the shipped input mixes cyclic and dihedral symmetry groups and includes self-clash pairs, a solver that hardcodes one global symmetry rule or ignores the self-clash edge case will diverge on at least one recipe rather than passing by coincidence."      # how the tests verify correctness

